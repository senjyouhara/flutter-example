include: package:flutter_lints/flutter.yaml

analyzer:
  # 排除不需要分析的目录，例如自动生成的代码
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "lib/generated_plugin_registrant.dart"
  strong-mode:
    # 隐式转换
    implicit-casts: false
    # 隐式dynamic
    implicit-dynamic: false
  plugins:
    - riverpod_lint: 3.1.3

linter:
  rules:
    # 1. 常用推荐规则（强烈建议开启）
    - avoid_print                      # 禁止在生产代码中使用 print，推荐使用日志框架
    - prefer_single_quotes             # 推荐使用单引号，使代码风格更统一
    - require_trailing_commas          # 推荐在集合、参数列表最后加逗号，便于 Git 对比和格式化
    - camel_case_types                 # 类型名（类、枚举等）使用驼峰命名法
    - constant_identifier_names        # 常量使用全大写加下划线命名
    - prefer_final_locals              # 若变量不重新赋值，则声明为 final
    - prefer_final_in_for_each         # 在 for-in 循环中，若迭代变量未重新赋值，也应使用 final
    - prefer_const_constructors        # 推荐使用 const 构造函数构建不会改变的子组件，以提升性能
    - prefer_const_declarations        # 推荐使用 const 声明常量

    # 2. 可选但有益的额外规则（可根据项目情况灵活添加或关闭）
    - always_declare_return_types      # 建议始终为公共方法和函数声明返回类型
    - prefer_expression_function_bodies # 对于简单的函数体，建议使用 => (箭头函数) 语法
    - unawaited_futures                # 确保在 async 函数中正确处理或等待每一个 Future
    - unnecessary_lambdas               # 避免创建不必要的 lambda 表达式，尽量使用 tear-off
    - sort_pub_dependencies             # 按字母顺序排列 pubspec.yaml 中的依赖包
    - sort_constructors_first           # 在类中，将构造函数放在字段声明之后、其他方法之前
    - directives_ordering               # 对导入/导出指令进行排序
    - always_use_package_imports        # 建议始终使用 'package:相对导入，使用 'package:xxx/yyy.dart'

    # 3. 官方规则中可能过于严格的部分（按需禁用）
    # 取消下面的注释并按需调整，可以使规则更宽松一些
    # lines_longer_than_80_chars: false   # 关闭行长度限制（如果你更喜欢自然的行宽）
    # prefer_relative_imports: false      # 关闭相对导入限制
    # public_member_api_docs: false       # 关闭强制要求为公共成员写文档注释的限制